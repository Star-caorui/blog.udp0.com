baseURL: "https://blog.udp0.com/"
disableHugoGeneratorInject: true
defaultContentLanguage: zh-cn
hasCJKLanguage: true
locale: zh-cn
title: iNetech Blog
summaryLength: 28
enableRobotsTXT: true
disableKinds:
  - taxonomy
  - term
  - section

permalinks:
  posts: "/posts/:slugorcontentbasename/"

outputs:
  home:
    - HTML
    - RSS

build:
  noJSConfigInAssets: true

params:
  favicon: "https://src.inetech.fun/favicon.webp"
  records:
    icp: 蒙 ICP 备 2022000209 号-2
    police: 蒙公网安备 15020202000279 号

menus:
  main:
    - name: 首页
      url: /
      weight: 10
    - name: 服务
      pageRef: /service
      weight: 20
    - name: 留言
      pageRef: /messages
      weight: 30
    - name: 朋友
      pageRef: /links
      weight: 40
    - name: 关于我
      pageRef: /about
      weight: 50
