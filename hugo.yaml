baseURL: "https://blog.udp0.com/"
disableHugoGeneratorInject: true
defaultContentLanguage: zh-cn
hasCJKLanguage: true
locale: zh-cn
title: iNetech Blog
summaryLength: 28
enableRobotsTXT: true
disableKinds:
  - taxonomy
  - term
  - section

permalinks:
  posts: "/posts/:slugorcontentbasename/"

outputs:
  home:
    - HTML
    - RSS

build:
  noJSConfigInAssets: true

markup:
  highlight:
    codeFences: false

params:
  description: "Betterr 的个人博客，记录 Arch Linux、系统运维、网络服务、安全加固与一些随手思考。"
  description404: "你访问的页面不存在，可以返回首页继续浏览 Betterr 的文章与页面。"
  favicon: "https://src.inetech.fun/favicon.webp"
  records:
    icp: 蒙 ICP 备 2022000209 号-2

menus:
  main:
    - name: 首页
      url: /
      weight: 10
    - name: 服务
      pageRef: /service
      weight: 20
    - name: 留言
      pageRef: /messages
      weight: 30
    - name: 朋友
      pageRef: /links
      weight: 40
    - name: 关于我
      pageRef: /about
      weight: 50
