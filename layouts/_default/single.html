{{ define "main" }}
  <article>
    <header>
      <p>{{ .Section | default "Page" | humanize }}</p>
      <h1>{{ .Title }}</h1>
      <div>
        <time datetime="{{ .Date.Format `2006-01-02` }}">{{ .Date.Format `2006-01-02` }}</time>
        {{ with .ReadingTime }}
          <span>{{ . }} min read</span>
        {{ end }}
      </div>
    </header>

    <section>
      {{ .Content }}
    </section>
  </article>

  {{ partial "comments.html" . }}
{{ end }}
