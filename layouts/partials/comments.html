{{ $slug := .Params.slug | default .File.ContentBaseName }}
{{ $commentsData := site.Data.comments | default dict }}
{{ $comments := index $commentsData $slug }}
{{ if $comments }}
  <section class="comments comments-pending" data-comments-slug="{{ $slug }}">
    <h2>Comments</h2>
    <div class="comments-placeholder" aria-live="polite">
      <p>Comments will load when needed.</p>
    </div>
    <noscript>{{ partial "comments-list.html" (dict "comments" $comments) }}</noscript>
  </section>
{{ end }}
