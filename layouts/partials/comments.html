{{ $slug := .Params.slug | default .File.ContentBaseName }}
{{ $commentsData := hugo.Data.comments | default dict }}
{{ $comments := index $commentsData $slug }}
{{ if $comments }}
  <section class="comments">
    <h2>Comments</h2>
    {{ partial "comments-list.html" (dict "comments" $comments) }}
  </section>
{{ end }}
