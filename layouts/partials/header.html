<header class="site-header">
  <div class="site-header-inner">
    {{ with site.Menus.main }}
      <nav class="site-nav" aria-label="Primary">
        {{ range . }}
          {{ partial "menu-link.html" (dict "item" . "page" $) }}
        {{ end }}
        {{ with site.Home.OutputFormats.Get "RSS" }}
          <a class="rss-link" href="{{ .RelPermalink }}" target="_blank" rel="noopener noreferrer">
            <span>RSS</span>
            <span class="nav-external-icon" aria-hidden="true">&#x2197;&#xFE0E;</span>
          </a>
        {{ end }}
      </nav>
    {{ end }}
  </div>
</header>
