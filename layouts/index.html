{{ define "main" }}
  <header class="page-header">
    <p class="eyebrow">Page</p>
    <h1>Posts</h1>
  </header>

  {{ $posts := where site.RegularPages "Section" "posts" }}
  <section class="post-list home-post-list" aria-label="Recent posts">
    {{ range $posts.ByDate.Reverse }}
      {{ partial "post-line.html" . }}
    {{ end }}
  </section>
{{ end }}
