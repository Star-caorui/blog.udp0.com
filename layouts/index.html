{{ define "main" }}
  <header>
    <p>Page</p>
    <h1>Posts</h1>
  </header>

  <section aria-label="Recent posts">
    {{ range (where site.RegularPages "Section" "posts").ByDate.Reverse }}
      <article>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <time datetime="{{ .Date.Format `2006-01-02` }}">{{ .Date.Format `2006-01-02` }}</time>
      </article>
    {{ end }}
  </section>
{{ end }}
